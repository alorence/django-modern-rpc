name: Tests & Checks

on:
  push:
    branches-ignore:
      - '*-no-ci'
    tags:
      - '*'
  pull_request:
    branches:
      - main
  schedule:
    # * is a special character in YAML and must be quoted
    - cron: '55 2 */7 * *'

env:
  UV_VERSION: 0.11.28

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: Print env information
      run: |
        echo "github.event_name = ${{ github.event_name }}"
        echo "github.ref = ${{ github.ref }}"
        echo "is a tag = ${{ startsWith(github.ref, 'refs/tags/') }}"
        echo "is a manual run = ${{ github.event.inputs.target_repo != '' }}"

  lockfile-check:
    runs-on: ubuntu-latest
    needs: debug
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}
    - name: Check lockfile
      run: uv lock --check

  linter:
    runs-on: ubuntu-latest
    needs: debug
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}
    - name: Ruff
      run: uv run ruff check .

  formatter:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: debug
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}
    - name: Ruff Format
      run: uv run ruff format . --check

  mypy:
    runs-on: ubuntu-latest
    needs: debug
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}
    - name: Mypy
      run: |
        uv run --group=type-checking mypy .

  ty:
    runs-on: ubuntu-latest
    needs: debug
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}
    - name: Ty
      continue-on-error: true
      run: |
        uv run --group=type-checking ty check .

  generate-jobs:
    runs-on: ubuntu-latest
    needs: debug
    outputs:
      session: ${{ steps.set-matrix.outputs.session }}
    steps:
    - uses: actions/checkout@v6
    - name: Install nox
      uses: wntrblm/nox@97e345e6a26bb2c5aacff9cc4327bd4ac1b00ce6  # 2026.04.10 - https://github.com/wntrblm/nox/releases
    - name: Build GH Actions test matrix from nox sessions
      id: set-matrix
      shell: bash
      run: echo session=$(nox -t cicd-tests --list --json | jq -c '[.[].session]') | tee --append $GITHUB_OUTPUT

  tests:
    name: ${{ matrix.session }}
    needs: generate-jobs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJson(needs.generate-jobs.outputs.session) }}
    steps:
    - uses: actions/checkout@v6

    - name: Install nox
      uses: wntrblm/nox@97e345e6a26bb2c5aacff9cc4327bd4ac1b00ce6  # 2026.04.10 - https://github.com/wntrblm/nox/releases

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0, see https://github.com/astral-sh/setup-uv/releases
      with:
        version: ${{ env.UV_VERSION }}

    - name: Test session
      run: nox -s "${{ matrix.session }}" -- --cov --cov-report=xml:coverage.xml

    - name: Submit coverage report - Coveralls
      continue-on-error: true
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6 - https://github.com/coverallsapp/github-action/releases

    - name: Submit coverage report - Codacy
      continue-on-error: true
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      run: uvx --from codacy-coverage python-codacy-coverage -r coverage.xml

    - uses: gacts/github-slug@83cd3d95888be8777f0d9c810c1266da1c5c3ef1 # v1.3.5 - https://github.com/gacts/github-slug/releases
      id: test-session-slug
      with:
        to-slug: "${{ matrix.session }}"

    - name: Archive coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 - https://github.com/actions/upload-artifact/releases
      with:
        name: report-${{ steps.test-session-slug.outputs.slug }}
        path: coverage.xml

  sonar:
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # SonraQube analysis requires disabling shallow clones

    - name: Collect coverage report files
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 - https://github.com/actions/download-artifact/releases
      with:
        path: ./artifacts

    - name: SonarQube Scan + Coverage upload
      continue-on-error: true
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0 - https://github.com/SonarSource/sonarqube-scan-action/releases
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          --define sonar.python.coverage.reportPaths="artifacts/report-*/coverage.xml"
